<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cronômetro</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />

    <style>
        :root {
            color-scheme: dark;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background: #000;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        #backgroundSlider {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, .5);
        }

        .bg-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            background-size: cover;
            background-position: center center;
            filter: blur(12px) brightness(.8);
            transform: scale(1.1);
            pointer-events: none;
        }

        .bg-slide.active {
            opacity: 1;
        }

        .progress-circle {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-circle svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .progress-circle circle {
            fill: none;
            stroke-width: 20;
            transform-origin: 50% 50%;
            transform: rotate(-90deg);
        }

        .bg-circle {
            stroke: rgba(255, 255, 255, .15);
        }

        .fg-circle {
            stroke: #fff;
            transition: stroke-dashoffset .3s linear, stroke .5s ease;
        }

        #blackoutOverlay {
            z-index: 50;
            transition: opacity 1.5s ease-in-out;
        }

        #startButton {
            z-index: 10;
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, .3);
            transition: all .3s ease;
            -webkit-user-drag: none;
        }

        #startButton:hover {
            background: rgba(255, 255, 255, .2);
            transform: scale(1.05);
        }

        .config-panel {
            background: rgba(0, 0, 0, .35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .14);
            box-shadow: 0 10px 40px rgba(0, 0, 0, .25);
        }

        .time-input {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .16);
            color: #fff;
        }

        .time-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, .35);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .08);
        }

        .preset-btn {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            transition: all .2s ease;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, .16);
            transform: translateY(-1px);
        }

        .preset-btn.active {
            background: rgba(255, 255, 255, .18);
            border-color: rgba(255, 255, 255, .3);
        }

        .target-badge {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
        }

        * {
            -webkit-user-drag: none;
        }

        @media (max-width: 768px) {
            .progress-circle {
                width: 320px;
                height: 320px;
            }

            .progress-circle circle {
                stroke-width: 18;
            }

            .progress-circle .bg-circle,
            .progress-circle .fg-circle {
                r: 145;
            }

            #timer {
                font-size: 4rem !important;
            }

            #startButton {
                width: 9rem;
                height: 9rem;
            }

            #startButton svg {
                width: 4rem;
                height: 4rem;
            }
        }

        @media (max-width: 420px) {
            .progress-circle {
                width: 270px;
                height: 270px;
            }

            #timer {
                font-size: 3.2rem !important;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen relative overflow-hidden" oncontextmenu="return false">
    <div id="backgroundSlider" aria-hidden="true"></div>

    <div id="blackoutOverlay" class="fixed top-0 left-0 w-full h-full bg-black hidden opacity-0"></div>

    <div id="startContainer" class="relative z-10 select-none flex flex-col items-center gap-6 px-4">
        <div class="config-panel rounded-3xl px-5 py-5 w-full max-w-md text-white">
            <div class="text-center mb-4">
                <div class="text-sm uppercase tracking-[0.25em] text-white/60">Configuração</div>
                <h1 class="text-2xl font-semibold mt-2">Escolha o horário alvo</h1>
                <p class="text-sm text-white/70 mt-2">Defina a hora da reunião e depois toque em iniciar.</p>
            </div>

            <div class="mb-4">
                <label for="targetTimeInput" class="block text-sm text-white/80 mb-2">Horário</label>
                <input id="targetTimeInput" type="time" step="60"
                    class="time-input w-full rounded-2xl px-4 py-3 text-lg" />
            </div>

            <div class="mb-4">
                <div class="text-sm text-white/80 mb-2">Horários rápidos</div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <button class="preset-btn preset-time rounded-xl px-3 py-2 text-sm" data-time="09:00">09:00</button>
                    <button class="preset-btn preset-time rounded-xl px-3 py-2 text-sm" data-time="18:00">18:00</button>
                    <button class="preset-btn preset-time rounded-xl px-3 py-2 text-sm" data-time="19:00">19:00</button>
                    <button class="preset-btn preset-time rounded-xl px-3 py-2 text-sm" data-time="19:45">19:45</button>
                </div>
            </div>

            <div id="targetInfo" class="target-badge rounded-2xl px-4 py-3 text-sm text-white/85">
                Alvo programado: --
            </div>
        </div>

        <button id="startButton"
            class="w-48 h-48 rounded-full flex items-center justify-center text-white shadow-2xl active:scale-95">
            <svg class="w-28 h-28" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                aria-hidden="true">
                <path fill-rule="evenodd"
                    d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653z"
                    clip-rule="evenodd" />
            </svg>
            <span class="sr-only">Iniciar cronômetro</span>
        </button>
    </div>

    <div id="timerContainer" class="hidden relative z-10 select-none" aria-live="polite">
        <div class="progress-circle">
            <svg role="img" aria-label="Progresso do tempo">
                <circle class="bg-circle" cx="50%" cy="50%" r="230"></circle>
                <circle id="fgCircle" class="fg-circle" cx="50%" cy="50%" r="230"></circle>
            </svg>
            <div id="timer" class="absolute font-orbitron text-[7rem] font-bold text-white">00:00</div>
        </div>
    </div>

    <script>
        // ======= CONFIG =======
        const DEFAULT_TARGET_TIME = '19:45';
        const STORAGE_KEY = 'cronometro_target_time';

        // ======= DOM =======
        const backgroundSlider = document.getElementById('backgroundSlider');
        const blackoutOverlay = document.getElementById('blackoutOverlay');
        const startContainer = document.getElementById('startContainer');
        const startButton = document.getElementById('startButton');
        const timerContainer = document.getElementById('timerContainer');
        const timerDisplay = document.getElementById('timer');
        const fgCircle = document.getElementById('fgCircle');
        const targetTimeInput = document.getElementById('targetTimeInput');
        const targetInfo = document.getElementById('targetInfo');
        const presetButtons = document.querySelectorAll('.preset-time');

        // ======= STATE =======
        let timeInSeconds = 0;
        let totalAtStart = 1;
        let countdownInterval;
        let isRunning = false;
        let targetDateTime = null;

        // círculo
        let radius = fgCircle.r.baseVal.value;
        let circumference = 2 * Math.PI * radius;
        fgCircle.style.strokeDasharray = `${circumference} ${circumference}`;
        fgCircle.style.strokeDashoffset = circumference;

        function refreshCircleMetrics() {
            radius = fgCircle.r.baseVal.value;
            circumference = 2 * Math.PI * radius;
            fgCircle.style.strokeDasharray = `${circumference} ${circumference}`;
            fgCircle.style.strokeDashoffset = circumference;
        }

        // imagens como background em DIV
        const backgroundImages = [
            'https://cms-imgp.jw-cdn.org/img/p/2022681/univ/art/2022681_univ_cnt_2_lg.jpg',
            'https://cms-imgp.jw-cdn.org/img/p/2022681/univ/art/2022681_univ_cnt_4_xl.jpg',
            'https://cms-imgp.jw-cdn.org/img/p/1102025973/univ/art/1102025973_univ_cnt_1_xl.jpg',
            'https://cms-imgp.jw-cdn.org/img/p/1102025973/univ/art/1102025973_univ_cnt_7_xl.jpg'
        ];
        let currentImageIndex = 0;

        function loadBackgroundImages() {
            backgroundImages.forEach((src, index) => {
                const slide = document.createElement('div');
                slide.className = 'bg-slide' + (index === 0 ? ' active' : '');
                slide.style.backgroundImage = `url('${src}')`;
                backgroundSlider.appendChild(slide);
            });

            setInterval(() => {
                const slides = backgroundSlider.children;
                if (!slides.length) return;
                slides[currentImageIndex]?.classList.remove('active');
                currentImageIndex = (currentImageIndex + 1) % slides.length;
                slides[currentImageIndex]?.classList.add('active');
            }, 8000);
        }

        function setProgress(percent) {
            const clamped = Math.max(0, Math.min(100, percent));
            const offset = circumference - (clamped / 100) * circumference;
            fgCircle.style.strokeDashoffset = offset;
        }

        function formatMMSS(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function pad2(n) {
            return String(n).padStart(2, '0');
        }

        function parseTargetTime(value) {
            const [hh = '19', mm = '45'] = String(value || DEFAULT_TARGET_TIME).split(':');
            const hour = Math.max(0, Math.min(23, Number(hh)));
            const minute = Math.max(0, Math.min(59, Number(mm)));
            return { hour, minute };
        }

        function getSelectedTimeString() {
            return targetTimeInput.value || DEFAULT_TARGET_TIME;
        }

        function saveSelectedTime() {
            localStorage.setItem(STORAGE_KEY, getSelectedTimeString());
        }

        function loadSelectedTime() {
            const saved = localStorage.getItem(STORAGE_KEY);
            targetTimeInput.value = saved || DEFAULT_TARGET_TIME;
        }

        function computeTargetDateTime() {
            const now = new Date();
            const { hour, minute } = parseTargetTime(getSelectedTimeString());

            const target = new Date(
                now.getFullYear(),
                now.getMonth(),
                now.getDate(),
                hour,
                minute,
                0,
                0
            );

            // Se já passou hoje, agenda para amanhã
            if (target.getTime() <= now.getTime()) {
                target.setDate(target.getDate() + 1);
            }

            return target;
        }

        function getSecondsUntilTarget() {
            targetDateTime = computeTargetDateTime();
            const diffMs = targetDateTime.getTime() - Date.now();
            return Math.max(0, Math.floor(diffMs / 1000));
        }

        function formatTargetDateInfo(date) {
            const now = new Date();
            const isToday =
                date.getFullYear() === now.getFullYear() &&
                date.getMonth() === now.getMonth() &&
                date.getDate() === now.getDate();

            const tomorrow = new Date(now);
            tomorrow.setDate(now.getDate() + 1);

            const isTomorrow =
                date.getFullYear() === tomorrow.getFullYear() &&
                date.getMonth() === tomorrow.getMonth() &&
                date.getDate() === tomorrow.getDate();

            const hh = pad2(date.getHours());
            const mm = pad2(date.getMinutes());

            if (isToday) return `Hoje às ${hh}:${mm}`;
            if (isTomorrow) return `Amanhã às ${hh}:${mm}`;

            return `${pad2(date.getDate())}/${pad2(date.getMonth() + 1)} às ${hh}:${mm}`;
        }

        function updatePresetButtons() {
            const selected = getSelectedTimeString();
            presetButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.time === selected);
            });
        }

        function updateTargetInfo() {
            const previewTarget = computeTargetDateTime();
            const seconds = Math.max(0, Math.floor((previewTarget.getTime() - Date.now()) / 1000));
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);

            let remainingText = '';
            if (hours > 0) {
                remainingText = `Faltam aproximadamente ${hours}h ${minutes}min.`;
            } else {
                remainingText = `Faltam aproximadamente ${minutes}min.`;
            }

            targetInfo.textContent = `Alvo programado: ${formatTargetDateInfo(previewTarget)}. ${remainingText}`;
            updatePresetButtons();
        }

        function updateDisplay() {
            timerDisplay.textContent = formatMMSS(timeInSeconds);

            const percent = (timeInSeconds / totalAtStart) * 100;
            setProgress(percent);

            fgCircle.classList.remove('stroke-white', 'stroke-yellow-300', 'stroke-red-500');
            if (timeInSeconds <= 10) fgCircle.classList.add('stroke-red-500');
            else if (timeInSeconds <= 60) fgCircle.classList.add('stroke-yellow-300');
            else fgCircle.classList.add('stroke-white');
        }

        function showBlackout() {
            timerContainer.classList.add('hidden');
            blackoutOverlay.classList.remove('hidden');
            requestAnimationFrame(() => blackoutOverlay.classList.remove('opacity-0'));
        }

        function tryClosePage() {
            try { window.close(); } catch (_) { }
        }

        function finishAndClose() {
            clearInterval(countdownInterval);
            isRunning = false;
            showBlackout();
            setTimeout(tryClosePage, 700);
        }

        function resetApp() {
            clearInterval(countdownInterval);
            isRunning = false;

            timeInSeconds = getSecondsUntilTarget();
            totalAtStart = Math.max(1, timeInSeconds);

            updateDisplay();
            updateTargetInfo();

            blackoutOverlay.classList.add('hidden', 'opacity-0');
            timerContainer.classList.add('hidden');
            startContainer.classList.remove('hidden');
        }

        // ======= FULLSCREEN =======
        async function requestFullscreenSafe() {
            try {
                if (document.fullscreenElement) return;
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (_) { }
        }

        function armFullscreenOnFirstUserGesture() {
            const handler = async () => {
                cleanup();
                await requestFullscreenSafe();
            };

            const cleanup = () => {
                window.removeEventListener('pointerdown', handler, true);
                window.removeEventListener('keydown', handler, true);
                window.removeEventListener('touchstart', handler, true);
            };

            window.addEventListener('pointerdown', handler, true);
            window.addEventListener('keydown', handler, true);
            window.addEventListener('touchstart', handler, true);
        }

        // ======= SEGUNDA TELA =======
        function isAutostartWindow() {
            const p = new URLSearchParams(location.search);
            return p.get('autostart') === '1';
        }

        function isPopupWindow() {
            const p = new URLSearchParams(location.search);
            return p.get('popup') === '1';
        }

        async function openOnSecondScreenIfPossible() {
            if (isPopupWindow()) return false;

            const baseUrl = new URL(location.href);
            baseUrl.searchParams.set('popup', '1');
            baseUrl.searchParams.set('autostart', '1');
            baseUrl.searchParams.set('targetTime', getSelectedTimeString());

            if ('getScreenDetails' in window) {
                try {
                    const details = await window.getScreenDetails();
                    if (details?.screens?.length > 1) {
                        const current = details.currentScreen;
                        const second = details.screens.find(s => s !== current) || details.screens[1];

                        const left = Math.round(second.availLeft ?? second.left ?? 0);
                        const top = Math.round(second.availTop ?? second.top ?? 0);
                        const width = Math.round(second.availWidth ?? second.width ?? 1280);
                        const height = Math.round(second.availHeight ?? second.height ?? 720);

                        const win = window.open(
                            baseUrl.toString(),
                            'cronometro_second_screen',
                            `popup=yes,left=${left},top=${top},width=${width},height=${height}`
                        );

                        if (win) {
                            try { win.focus(); } catch (_) { }
                            try { window.close(); } catch (_) { }
                            return true;
                        }
                    }
                } catch (_) { }
            }

            try {
                const approxLeft = (window.screenX || 0) + (window.outerWidth || 1200);
                const approxTop = (window.screenY || 0);

                const win = window.open(
                    baseUrl.toString(),
                    'cronometro_second_screen',
                    `popup=yes,left=${approxLeft},top=${approxTop},width=${window.outerWidth || 1200},height=${window.outerHeight || 800}`
                );

                if (win) {
                    try { win.focus(); } catch (_) { }
                    try { window.close(); } catch (_) { }
                    return true;
                }
            } catch (_) { }

            return false;
        }

        // ======= TIMER =======
        async function startTimer() {
            if (isRunning) return;

            saveSelectedTime();

            const moved = await openOnSecondScreenIfPossible();
            if (moved) return;

            timeInSeconds = getSecondsUntilTarget();
            totalAtStart = Math.max(1, timeInSeconds);

            if (timeInSeconds <= 0) {
                startContainer.classList.add('hidden');
                timerContainer.classList.remove('hidden');
                updateDisplay();
                finishAndClose();
                return;
            }

            await requestFullscreenSafe();

            startContainer.classList.add('hidden');
            timerContainer.classList.remove('hidden');
            isRunning = true;

            updateDisplay();

            countdownInterval = setInterval(() => {
                const remaining = Math.max(0, Math.floor((targetDateTime.getTime() - Date.now()) / 1000));
                timeInSeconds = remaining;
                updateDisplay();

                if (timeInSeconds <= 0) finishAndClose();
            }, 250);
        }

        // ======= EVENTOS =======
        startButton.addEventListener('click', startTimer);

        targetTimeInput.addEventListener('input', () => {
            saveSelectedTime();
            updateTargetInfo();
        });

        presetButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                targetTimeInput.value = btn.dataset.time;
                saveSelectedTime();
                updateTargetInfo();
            });
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isRunning) resetApp();
        });

        document.addEventListener('dragstart', e => e.preventDefault(), true);
        document.addEventListener('drop', e => e.preventDefault(), true);
        document.addEventListener('selectstart', e => e.preventDefault(), true);

        document.addEventListener('mousedown', (e) => {
            if (isRunning) e.preventDefault();
        }, { passive: false });

        document.addEventListener('mousemove', (e) => {
            if (isRunning && (e.buttons & 1)) e.preventDefault();
        }, { passive: false });

        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('cut', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            const k = e.key?.toLowerCase();
            if ((e.ctrlKey || e.metaKey) && ['s', 'p', 'u', 'c', 'i', 'j'].includes(k)) e.preventDefault();
            if (k === 'f12') e.preventDefault();

            if (!isRunning && (k === 'enter' || k === ' ')) {
                e.preventDefault();
                startTimer();
            }
        });

        window.addEventListener('resize', refreshCircleMetrics);

        // ======= INICIALIZAÇÃO =======
        function applyUrlTimeIfExists() {
            const p = new URLSearchParams(location.search);
            const targetTime = p.get('targetTime');
            if (targetTime && /^\d{2}:\d{2}$/.test(targetTime)) {
                targetTimeInput.value = targetTime;
                localStorage.setItem(STORAGE_KEY, targetTime);
                return;
            }
            loadSelectedTime();
        }

        loadBackgroundImages();
        applyUrlTimeIfExists();
        refreshCircleMetrics();
        resetApp();

        if (isAutostartWindow()) {
            armFullscreenOnFirstUserGesture();
            setTimeout(() => startTimer(), 50);
        }
    </script>
</body>

</html>
